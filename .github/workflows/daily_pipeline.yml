name: NeoSignal Daily Report — 9 AM IST

on:
  schedule:
    - cron: '30 3 * * *'   # 09:00 AM IST (UTC+5:30) every day
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system fonts (Unicode PDF)
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare directories
        run: mkdir -p data reports archive

      # ── Config override via env vars (no secrets in config.yaml) ─────────────
      # Add NEOSIGNAL__* vars in repo Settings → Secrets → Actions to override
      # any config.yaml value at runtime without touching source code.
      # Example: NEOSIGNAL__SCRAPER__HN_LIMIT=100

      - name: Run scraper
        run: python -m src.scraper

      - name: Validate scraper output
        id: scraper
        run: |
          if [ ! -f data/news_feed.json ]; then
            echo "::error::Scraper did not produce data/news_feed.json"
            exit 1
          fi
          ARTICLE_COUNT=$(python -c "import json; d=json.load(open('data/news_feed.json')); print(d['meta']['article_count'])")
          RAW_COUNT=$(python -c "import json; d=json.load(open('data/news_feed.json')); print(d['meta'].get('raw_count',0))")
          echo "Scraped: $ARTICLE_COUNT articles (raw: $RAW_COUNT)"
          echo "articles=$ARTICLE_COUNT" >> "$GITHUB_OUTPUT"
          echo "raw_count=$RAW_COUNT"    >> "$GITHUB_OUTPUT"

      - name: Generate PDF report
        run: python -m src.pdf_generator

      - name: Validate PDF
        id: pdf
        run: |
          PDF_PATH=$(ls -t reports/neosignal_*.pdf 2>/dev/null | head -1)
          if [ -z "$PDF_PATH" ]; then
            echo "::error::No PDF found in reports/ after generation"
            exit 1
          fi
          PDF_SIZE=$(stat -c%s "$PDF_PATH")
          echo "PDF: $PDF_PATH ($PDF_SIZE bytes)"
          echo "path=$PDF_PATH" >> "$GITHUB_OUTPUT"
          echo "size=$PDF_SIZE" >> "$GITHUB_OUTPUT"

      - name: Set IST timestamp
        run: echo "IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')" >> "$GITHUB_ENV"

      # ── Commit BEFORE email — PDF is always saved even if email fails ─────────
      - name: Commit and push report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "NeoSignal Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add data/news_feed.json
          git add reports/
          git add history.log

          if git diff --cached --quiet; then
            echo "No new content to commit."
            exit 0
          fi

          git commit -m "report: NeoSignal daily — ${{ env.IST_DATE }} — ${{ steps.scraper.outputs.articles }} stories"
          git pull --rebase origin main
          git push origin main
          echo "Report committed and pushed."

      # ── Email (gracefully skipped if secrets not set) ─────────────────────────
      - name: Check email secrets
        id: email_check
        run: |
          if [ -n "$SECRET_TO" ] && [ -n "$SECRET_USER" ] && [ -n "$SECRET_PASS" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Email secrets not configured — skipping. See .github/EMAIL_SETUP.md"
          fi
        env:
          SECRET_TO:   ${{ secrets.EMAIL_TO }}
          SECRET_USER: ${{ secrets.EMAIL_USERNAME }}
          SECRET_PASS: ${{ secrets.EMAIL_PASSWORD }}

      - name: Send PDF by email
        if: steps.email_check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: NeoSignal Bot <${{ secrets.EMAIL_USERNAME }}>
          subject: "NeoSignal Daily — ${{ steps.scraper.outputs.articles }} AI stories — ${{ env.IST_DATE }}"
          body: |
            Your NeoSignal AI Intelligence Report is attached.

            Today's summary
            ───────────────
            Stories verified : ${{ steps.scraper.outputs.articles }}
            Raw scraped      : ${{ steps.scraper.outputs.raw_count }}
            Report size      : ${{ steps.pdf.outputs.size }} bytes

            Sources: HackerNews, Reddit ×4, TechCrunch AI, VentureBeat AI,
                     MIT Tech Review, The Verge AI, Wired AI, ArXiv CS.AI

            Authenticity tiers
            ──────────────────
            VERIFIED  ≥80% — 3+ independent sources
            CONFIRMED ≥50% — 2 sources
            EMERGING  ≥25% — single source, passed AI keyword filter

            — NeoSignal Bot
            https://github.com/${{ github.repository }}
          attachments: ${{ steps.pdf.outputs.path }}

      - name: Upload debug artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            data/
            reports/
          retention-days: 7
